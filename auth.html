<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Signup | RRLabs</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full p-8 bg-white rounded-3xl shadow-xl border border-slate-100">
        <div class="text-center mb-8">
            <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center font-bold text-white mx-auto mb-4">R</div>
            <h2 id="auth-title" class="text-2xl font-bold text-slate-900">Create your account</h2>
            <p id="auth-subtitle" class="text-slate-500">Start your 14-day free trial today.</p>
        </div>

        <form id="auth-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Work Email</label>
                <input type="email" id="email" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="name@company.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                <input type="password" id="password" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full btn btn-primary py-3">Continue</button>
        </form>

        <div class="mt-6 text-center">
            <button id="toggle-auth" class="text-sm text-blue-600 font-semibold hover:underline">
                Already have an account? Log in
            </button>
        </div>
    </div>

    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
</body>
</html>
