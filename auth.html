<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | RRLabs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full p-8 bg-white rounded-3xl shadow-2xl border border-slate-100">
        <div class="text-center mb-8">
            <img src="logo.png" alt="RRLabs Logo" class="w-16 h-16 mx-auto mb-4 object-contain">
            <h2 id="auth-title" class="text-2xl font-bold text-slate-900">Welcome Back</h2>
            <p id="auth-subtitle" class="text-slate-500">Log in to manage your revenue recovery.</p>
        </div>

        <button id="google-auth-btn" class="w-full flex items-center justify-center gap-3 px-4 py-3 border border-slate-200 rounded-xl hover:bg-slate-50 transition mb-6 font-medium text-slate-700">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5">
            Continue with Google
        </button>

        <div class="relative mb-6">
            <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-slate-200"></span></div>
            <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-slate-400">Or continue with email</span></div>
        </div>

        <form id="auth-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                <input type="email" id="email" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="name@company.com">
            </div>
            <div id="password-group">
                <div class="flex justify-between">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <button type="button" id="forgot-password-link" class="text-xs text-blue-600 hover:underline">Forgot?</button>
                </div>
                <input type="password" id="password" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="••••••••">
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all transform active:scale-95">
                Sign In
            </button>
        </form>

        <div class="mt-6 text-center space-y-2">
            <p id="toggle-text" class="text-sm text-slate-500">
                Don't have an account? 
                <button id="toggle-auth" class="text-blue-600 font-semibold hover:underline">Sign up for free</button>
            </p>
            <button id="back-to-login" class="hidden text-sm text-slate-500 hover:text-blue-600 transition">
                ← Back to Login
            </button>
        </div>
    </div>

    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
</body>
</html>
