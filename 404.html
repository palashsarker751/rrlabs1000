<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | RRLabs</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
    .cta-gradient { background: linear-gradient(90deg, #2563EB 0%, #16A34A 100%); }
    .floating { animation: floating 3s ease-in-out infinite; }
    @keyframes floating {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
      100% { transform: translateY(0px); }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center">

  <div class="max-w-xl px-6 text-center">
    <div class="flex justify-center mb-10">
      <div class="flex items-center gap-2">
        <img src="https://ibb.co.com/7tM7RmPw" alt="RRLabs Logo" class="h-12 w-auto">
        <span class="font-black text-3xl tracking-tight text-slate-900">RRLabs</span>
      </div>
    </div>

    <div class="relative mb-8">
      <h1 class="text-[150px] font-black text-slate-100 leading-none">404</h1>
      <div class="absolute inset-0 flex items-center justify-center">
        <div class="floating bg-white p-6 rounded-3xl shadow-2xl border border-slate-100">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 9.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
      </div>
    </div>

    <h2 class="text-3xl font-black text-slate-900 mb-4">Lost in the Pipeline?</h2>
    <p class="text-slate-500 text-lg mb-10">
      The page you're looking for was either moved, deleted, or never existed. Don't worry, we're better at recovering revenue than finding lost pages.
    </p>

    <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
      <a href="index.html" class="cta-gradient text-white px-8 py-4 rounded-2xl font-bold shadow-lg hover:scale-105 transition transform w-full sm:w-auto">
        Back to Home
      </a>
      <a href="dashboard.html" class="bg-white border-2 border-slate-200 text-slate-700 px-8 py-4 rounded-2xl font-bold hover:bg-slate-50 transition w-full sm:w-auto">
        Go to Dashboard
      </a>
    </div>

    <p class="mt-12 text-sm text-slate-400">
      Need help? <a href="mailto:support@rrlabs.online" class="text-blue-600 font-bold hover:underline">Contact Support</a>
    </p>
  </div>

</body>
</html>
