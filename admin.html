<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Founder Admin | RRLabs</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #0F172A; color: white; font-family: 'Inter', sans-serif; }
    .admin-card { background: #1E293B; border: 1px solid #334155; border-radius: 24px; }
    input, textarea { color: white; }
    input::placeholder, textarea::placeholder { color: #64748B; }
    .status-active { color: #22C55E; background: rgba(34, 197, 94, 0.1); }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <div id="navbar-placeholder"></div>

  <main class="flex-grow pt-28 pb-12">
    <div class="max-w-7xl mx-auto px-6">
      
      <div class="flex flex-col md:flex-row md:items-center justify-between mb-12 gap-6">
        <div>
          <h1 class="text-3xl font-black tracking-tight text-white">System Command Center</h1>
          <p class="text-slate-400 mt-1">Manage merchants and content for Revenue Recovery Labs</p>
        </div>
        <div class="admin-card px-6 py-3 flex items-center gap-3">
          <span class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span>
          <span class="text-sm font-bold">Admin: Palash Sarker</span>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
        <div class="admin-card p-8">
          <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-4">Net Earnings</p>
          <h2 class="text-4xl font-black text-green-400">$64,250</h2>
        </div>
        <div class="admin-card p-8">
          <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-4">Total Merchants</p>
          <h2 class="text-4xl font-black text-white">482</h2>
        </div>
        <div class="admin-card p-8">
          <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-4">Active Sequences</p>
          <h2 class="text-4xl font-black text-blue-400">1,204</h2>
        </div>
      </div>

      <section class="admin-card p-8 mb-12">
        <div class="flex items-center gap-3 mb-8">
            <div class="w-10 h-10 bg-blue-600/20 text-blue-500 rounded-xl flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                </svg>
            </div>
            <h3 class="text-xl font-bold">Create New Blog Post</h3>
        </div>

        <form id="blog-form" class="space-y-6">
            <div class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-black text-slate-500 uppercase mb-2">Article Title</label>
                    <input type="text" id="post-title" placeholder="e.g. How Gemini AI Boosts ROI" class="bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 w-full transition" required>
                </div>
                <div>
                    <label class="block text-xs font-black text-slate-500 uppercase mb-2">Category</label>
                    <input type="text" id="post-category" placeholder="e.g. AI, Strategy" class="bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 w-full transition" required>
                </div>
            </div>
            <div>
                <label class="block text-xs font-black text-slate-500 uppercase mb-2">Excerpt (Quick Summary)</label>
                <textarea id="post-excerpt" placeholder="A brief summary for the blog listing page..." class="bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 w-full h-20 transition" required></textarea>
            </div>
            <div>
                <label class="block text-xs font-black text-slate-500 uppercase mb-2">Full Content (HTML Allowed)</label>
                <textarea id="post-content" placeholder="Write your full article here. You can use <p>, <b>, <h2> tags..." class="bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 w-full h-48 transition" required></textarea>
            </div>
            <div class="flex justify-end">
                <button type="submit" id="submit-btn" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-bold hover:bg-blue-700 transition shadow-lg flex items-center gap-2">
                    Publish to RRLabs Blog <span>→</span>
                </button>
            </div>
        </form>
      </section>

      <section class="admin-card overflow-hidden">
        <div class="p-6 border-b border-slate-700">
            <h3 class="font-bold">Recent Blog Posts</h3>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="bg-slate-800/50 text-slate-400 text-xs uppercase font-black">
                        <th class="px-8 py-4">Title</th>
                        <th class="px-8 py-4">Category</th>
                        <th class="px-8 py-4">Date</th>
                        <th class="px-8 py-4 text-right">Action</th>
                    </tr>
                </thead>
                <tbody id="admin-posts-list" class="divide-y divide-slate-700 text-sm">
                    <tr><td colspan="4" class="px-8 py-10 text-center text-slate-500">Loading your posts...</td></tr>
                </tbody>
            </table>
        </div>
      </section>

    </div>
  </main>

  <script src="supabase-config.js"></script>
  <script>
    // 1. Load Recent Posts in Admin Table
    async function fetchAdminPosts() {
        const listContainer = document.getElementById('admin-posts-list');
        const { data: posts, error } = await supabase
            .from('blog_posts')
            .select('id, title, category, created_at')
            .order('created_at', { ascending: false })
            .limit(10);

        if (error) {
            listContainer.innerHTML = `<tr><td colspan="4" class="px-8 py-4 text-red-400 text-center">Error loading posts</td></tr>`;
            return;
        }

        if (posts.length === 0) {
            listContainer.innerHTML = `<tr><td colspan="4" class="px-8 py-4 text-center">No posts found. Start writing!</td></tr>`;
            return;
        }

        listContainer.innerHTML = posts.map(post => `
            <tr class="hover:bg-slate-800/30 transition">
                <td class="px-8 py-4 font-bold text-slate-200">${post.title}</td>
                <td class="px-8 py-4"><span class="px-2 py-1 bg-slate-700 rounded text-[10px]">${post.category}</span></td>
                <td class="px-8 py-4 text-slate-400">${new Date(post.created_at).toLocaleDateString()}</td>
                <td class="px-8 py-4 text-right">
                    <button onclick="deletePost('${post.id}')" class="text-red-400 hover:text-red-600 font-bold">Delete</button>
                </td>
            </tr>
        `).join('');
    }

    // 2. Blog Submission Logic
    document.getElementById('blog-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.innerText = "Publishing...";
        btn.disabled = true;

        const title = document.getElementById('post-title').value;
        const category = document.getElementById('post-category').value;
        const excerpt = document.getElementById('post-excerpt').value;
        const content = document.getElementById('post-content').value;

        const { data, error } = await supabase
            .from('blog_posts')
            .insert([{ title, category, excerpt, content }]);

        if (error) {
            alert("Error: " + error.message);
        } else {
            alert("Post Published!");
            document.getElementById('blog-form').reset();
            fetchAdminPosts(); // Refresh table
        }
        btn.innerText = "Publish to RRLabs Blog →";
        btn.disabled = false;
    });

    // 3. Delete Logic
    async function deletePost(id) {
        if(confirm("Are you sure you want to delete this post?")) {
            const { error } = await supabase.from('blog_posts').delete().eq('id', id);
            if (error) alert("Error deleting");
            else fetchAdminPosts();
        }
    }

    // Initial Load
    document.addEventListener('DOMContentLoaded', fetchAdminPosts);
  </script>
</body>
</html>
