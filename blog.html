<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog & Insights | Revenue Recovery Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); }
        .blog-card { transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); }
        .blog-card:hover { transform: translateY(-12px); box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.08); }
        .image-container { overflow: hidden; position: relative; }
        .image-container img { transition: transform 0.8s ease; }
        .blog-card:hover .image-container img { transform: scale(1.1); }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-[#F8FAFC]">

    <nav class="glass-nav sticky top-0 z-50 border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="hover:opacity-80 transition">
                <img src="logo.png" alt="RRLabs Logo" class="h-9">
            </a>
            <div class="flex gap-8 items-center font-bold text-sm tracking-tight text-slate-600">
                <a href="index.html" class="hover:text-blue-600 transition">Home</a>
                <a href="blog.html" class="text-blue-600">Insights</a>
                <button id="create-post-btn" class="bg-blue-600 text-white px-5 py-2.5 rounded-2xl hover:bg-blue-700 hover:shadow-lg hover:shadow-blue-200 transition-all">New Post</button>
            </div>
        </div>
    </nav>

    <header class="pt-24 pb-20 bg-white border-b border-slate-50 px-6">
        <div class="max-w-7xl mx-auto text-center">
            <span class="inline-block bg-blue-50 text-blue-700 text-[10px] font-bold px-4 py-1.5 rounded-full uppercase tracking-[0.2em] mb-6">Expert Insights</span>
            <h1 class="text-5xl md:text-7xl font-[800] text-slate-900 mb-6 tracking-[-0.03em]">The <span class="text-blue-600">Recovery</span> Digest</h1>
            <p class="text-xl text-slate-500 max-w-2xl mx-auto font-medium leading-relaxed">Advanced strategies for churn reduction, failed payment recovery, and scaling SaaS revenue.</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-20">
        <div class="flex flex-wrap gap-3 mb-12 justify-center">
            <button class="px-6 py-2 bg-slate-900 text-white rounded-full text-sm font-bold shadow-xl shadow-slate-200">All Posts</button>
            <button class="px-6 py-2 bg-white text-slate-600 border border-slate-100 rounded-full text-sm font-bold hover:bg-slate-50 transition">Case Studies</button>
            <button class="px-6 py-2 bg-white text-slate-600 border border-slate-100 rounded-full text-sm font-bold hover:bg-slate-50 transition">Strategies</button>
            <button class="px-6 py-2 bg-white text-slate-600 border border-slate-100 rounded-full text-sm font-bold hover:bg-slate-50 transition">Engineering</button>
        </div>

        <div id="combined-blog-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
            <div class="h-[450px] bg-white rounded-[40px] border border-slate-100 animate-pulse"></div>
            <div class="h-[450px] bg-white rounded-[40px] border border-slate-100 animate-pulse"></div>
            <div class="h-[450px] bg-white rounded-[40px] border border-slate-100 animate-pulse"></div>
        </div>
    </main>

    <footer class="py-12 border-t border-slate-100 text-center">
        <p class="text-slate-400 text-sm">© 2026 Revenue Recovery Labs. All Rights Reserved.</p>
    </footer>

    <script src="supabase-config.js"></script>
    <script src="blog.js"></script>
</body>
</html>
