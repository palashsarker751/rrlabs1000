<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revenue Intelligence | RRLabs God Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        .admin-card { background: #1e293b; border: 1px solid #334155; border-radius: 32px; transition: all 0.3s ease; }
        .admin-card:hover { border-color: #3b82f6; box-shadow: 0 0 30px rgba(59, 130, 246, 0.1); }
        .sidebar-link.active { background: #1e293b; color: #3b82f6; border-right: 4px solid #3b82f6; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        /* Dark Calendar Picker Styling */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="hidden lg:flex flex-col w-64 bg-[#0f172a] border-r border-slate-800 fixed h-full z-50">
        <div class="p-6">
            <a href="/" class="flex items-center gap-3 mb-10">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-black text-white">R</div>
                <div class="flex flex-col">
                    <span class="font-black text-sm tracking-tighter uppercase leading-none text-white">RRLABS</span>
                    <span class="text-blue-500 text-[8px] font-black uppercase tracking-[0.3em]">Analytics</span>
                </div>
            </a>
            <nav class="space-y-1">
                <a href="dashboard.html" class="sidebar-link flex items-center gap-3 px-4 py-3 text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-blue-500 rounded-xl transition italic">Dashboard</a>
                <a href="analytics.html" class="sidebar-link active flex items-center gap-3 px-4 py-3 text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-blue-500 rounded-xl transition italic">Analytics</a>
                <a href="records.html" class="sidebar-link flex items-center gap-3 px-4 py-3 text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-blue-500 rounded-xl transition italic">Recovery Records</a>
            </nav>
        </div>
    </aside>

    <main class="flex-grow lg:ml-64 p-6 md:p-10">
        
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-10 gap-6">
            <div>
                <h1 class="text-4xl font-black tracking-tight text-white uppercase italic">Revenue Intelligence</h1>
                <p class="text-slate-500 font-bold italic text-xs tracking-widest uppercase">Palash Sarker: Analyzing Global ROI Metrics</p>
            </div>
            
            <div class="flex flex-wrap items-center gap-4">
                <div class="flex items-center gap-2 bg-[#1e293b] p-2 rounded-2xl border border-slate-800">
                    <input type="date" id="start-date" class="bg-transparent text-[10px] font-black uppercase text-slate-400 outline-none cursor-pointer">
                    <span class="text-slate-600 font-black">-</span>
                    <input type="date" id="end-date" class="bg-transparent text-[10px] font-black uppercase text-slate-400 outline-none cursor-pointer">
                    <button id="apply-filter" class="ml-2 bg-blue-600 hover:bg-blue-500 text-white p-1.5 rounded-xl transition-all shadow-lg shadow-blue-500/20">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                        </svg>
                    </button>
                </div>

                <div class="flex gap-2 bg-[#1e293b] p-2 rounded-2xl border border-slate-800 shadow-sm" id="date-filter-group">
                    <button data-range="7" class="filter-btn px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-white transition-all">7D</button>
                    <button data-range="30" class="filter-btn px-4 py-2 bg-blue-600 rounded-xl text-[10px] font-black uppercase tracking-widest text-white shadow-lg shadow-blue-500/20 transition-all">30D</button>
                    <button data-range="90" class="filter-btn px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-white transition-all">90D</button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
            <div class="admin-card p-6 border-blue-500/20">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-2 italic">Avg. Recovery Time</p>
                <h3 class="text-3xl font-black text-white italic tracking-tighter" id="metric-time">--</h3>
            </div>
            <div class="admin-card p-6 border-green-500/20">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-2 italic">AI Efficiency</p>
                <h3 class="text-3xl font-black text-blue-500 italic tracking-tighter" id="metric-efficiency">--</h3>
            </div>
            <div class="admin-card p-6 border-white/5">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-2 italic">Msg. Open Rate</p>
                <h3 class="text-3xl font-black text-white italic tracking-tighter" id="metric-open-rate">--</h3>
            </div>
            <div class="admin-card p-6 border-green-500/20">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-2 italic">Cart Re-Entry</p>
                <h3 class="text-3xl font-black text-green-500 italic tracking-tighter">12.5%</h3>
            </div>
        </div>

        <div class="grid lg:grid-cols-3 gap-8 mb-10">
            <div class="lg:col-span-2 admin-card p-8">
                <div class="h-[350px]">
                    <canvas id="growthChart"></canvas>
                </div>
            </div>
            <div class="admin-card p-8">
                <h3 class="font-black italic text-lg tracking-tighter uppercase mb-8">Recovery Funnel</h3>
                <div id="funnel-container" class="space-y-4"></div>
            </div>
        </div>

        <div class="admin-card overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-900/50 text-slate-500 text-[9px] uppercase font-black tracking-[0.2em]">
                            <th class="px-8 py-5">Channel</th>
                            <th class="px-8 py-5">Volume</th>
                            <th class="px-8 py-5">Value Recovered</th>
                            <th class="px-8 py-5">CR%</th>
                            <th class="px-8 py-5 text-right">Trend</th>
                        </tr>
                    </thead>
                    <tbody id="channel-stats-body" class="text-[11px] font-bold text-white uppercase"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="analytics-engine.js"></script>
</body>
</html>
