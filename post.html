<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article | Revenue Recovery Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); }
        .progress-bar { height: 4px; background: #2563eb; position: fixed; top: 0; left: 0; width: 0%; z-index: 100; transition: width 0.1s ease; }
        .article-content h2 { font-size: 1.875rem; font-weight: 800; color: #0f172a; margin-top: 2.5rem; margin-bottom: 1rem; }
        .article-content p { font-size: 1.125rem; line-height: 1.8; color: #475569; margin-bottom: 1.5rem; }
    </style>
</head>
<body class="bg-white">

    <div class="progress-bar" id="reading-progress"></div>

    <nav class="glass-nav sticky top-0 z-50 border-b border-slate-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="blog.html" class="flex items-center gap-2 group">
                <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center group-hover:bg-blue-600 group-hover:text-white transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </div>
                <span class="text-sm font-bold text-slate-600 group-hover:text-blue-600 transition">Back to Insights</span>
            </a>
            <img src="logo.png" alt="RRLabs" class="h-8">
            <a href="auth.html" class="text-sm font-bold text-blue-600 hover:underline">Get Started</a>
        </div>
    </nav>

    <main id="post-view" class="pt-16 pb-24">
        <div class="max-w-3xl mx-auto px-6">
            
            <header class="mb-16">
                <span id="post-category" class="bg-blue-50 text-blue-600 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest">Strategy</span>
                <h1 id="post-title" class="text-4xl md:text-6xl font-[800] text-slate-900 leading-[1.1] mt-6 mb-8 tracking-[-0.03em]">Loading insights...</h1>
                
                <div class="flex items-center justify-between border-y border-slate-100 py-6">
                    <div class="flex items-center gap-4">
                        <img src="logo.png" class="w-10 h-10 rounded-full border p-1 bg-slate-50 grayscale shadow-sm">
                        <div>
                            <p id="post-author" class="text-sm font-extrabold text-slate-900">Palash Sarker</p>
                            <p id="post-date" class="text-xs font-medium text-slate-400">May 16, 2026</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button class="p-2 rounded-full border border-slate-100 hover:bg-slate-50 transition"><svg class="w-4 h-4 text-slate-400" fill="currentColor" viewBox="0 0 24 24"><path d="M24 4.557c-.883.392-1.832.656-2.828.775 1.017-.609 1.798-1.574 2.165-2.724-.951.564-2.005.974-3.127 1.195-.897-.957-2.178-1.555-3.594-1.555-3.179 0-5.515 2.966-4.797 6.045-4.091-.205-7.719-2.165-10.148-5.144-1.29 2.213-.669 5.108 1.523 6.574-.806-.026-1.566-.247-2.229-.616-.054 2.281 1.581 4.415 3.949 4.89-.693.188-1.452.232-2.224.084.626 1.956 2.444 3.379 4.6 3.419-2.07 1.623-4.678 2.348-7.29 2.04 2.179 1.397 4.768 2.212 7.548 2.212 9.142 0 14.307-7.721 13.995-14.646.962-.695 1.797-1.562 2.457-2.549z"/></svg></button>
                        <button class="p-2 rounded-full border border-slate-100 hover:bg-slate-50 transition"><svg class="w-4 h-4 text-slate-400" fill="currentColor" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.761 0 5-2.239 5-5v-14c0-2.761-2.239-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg></button>
                    </div>
                </div>
            </header>

            <div id="post-content" class="article-content mb-20 animate-fade-in">
                </div>

            <section class="mt-20 p-12 bg-slate-900 rounded-[40px] text-center relative overflow-hidden shadow-2xl">
                <div class="relative z-10">
                    <h3 class="text-2xl md:text-3xl font-extrabold text-white mb-4">Start recovering revenue today.</h3>
                    <p class="text-slate-400 font-medium mb-8">Join the 400+ SaaS leaders building a better financial future.</p>
                    <div class="flex flex-col md:flex-row gap-4 justify-center">
                        <a href="auth.html" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold hover:bg-blue-700 transition transform active:scale-95 shadow-lg shadow-blue-500/20">Sign up for RRLabs</a>
                        <button class="bg-white/10 text-white border border-white/10 px-8 py-4 rounded-2xl font-bold hover:bg-white/20 transition backdrop-blur-md">Talk to Sales</button>
                    </div>
                </div>
                <div class="absolute -top-10 -right-10 w-40 h-40 bg-blue-600 rounded-full blur-[80px] opacity-20"></div>
                <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-blue-400 rounded-full blur-[80px] opacity-20"></div>
            </section>
        </div>
    </main>

    <script src="supabase-config.js"></script>
    <script src="post.js"></script>
</body>
</html>
