<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success | Revenue Recovery Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-container { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(226, 232, 240, 0.5); 
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6 antialiased">

    <div class="max-w-xl w-full">
        <div class="glass-container rounded-[48px] p-10 md:p-16 shadow-2xl shadow-blue-900/10 text-center relative overflow-hidden">
            
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-blue-500/10 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-blue-600/10 rounded-full blur-3xl"></div>

            <div class="relative mb-10">
                <div class="h-24 w-24 bg-blue-600 rounded-[32px] flex items-center justify-center mx-auto shadow-2xl shadow-blue-500/40 animate-float">
                    <svg class="h-12 w-12 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
            </div>

            <h1 class="text-4xl md:text-5xl font-black tracking-tighter text-slate-900 mb-4">
                System <span class="text-blue-600">Ready.</span>
            </h1>
            <p class="text-slate-500 font-medium leading-relaxed mb-10">
                Your account is now active. Gemini AI is ready to start recovering your abandoned revenue. Your dashboard is now fully unlocked.
            </p>

            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="admin.html" class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-slate-800 transition-all shadow-xl shadow-slate-900/10">
                    Go to Dashboard
                </a>
                <a href="api-docs.html" class="bg-white border border-slate-200 text-slate-600 px-8 py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-slate-50 transition-all">
                    View API Docs
                </a>
            </div>

            <div class="mt-12 pt-8 border-t border-slate-100">
                <div class="flex items-center justify-center gap-6">
                    <div class="text-left">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Status</p>
                        <p class="text-xs font-bold text-green-600 uppercase">Live & Encrypted</p>
                    </div>
                    <div class="h-8 w-[1px] bg-slate-100"></div>
                    <div class="text-left">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Architecture</p>
                        <p class="text-xs font-bold text-slate-900 uppercase">v1.0.4-Stable</p>
                    </div>
                </div>
            </div>
        </div>

        <p class="text-center mt-8 text-sm font-bold text-slate-400">
            Need help? <a href="contact.html" class="text-blue-600 hover:underline">Contact Architecture Support</a>
        </p>
    </div>

</body>
</html>
