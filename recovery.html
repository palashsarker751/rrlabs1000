<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recovery Manager | RRLabs</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #F8FAFC; }
    .status-pill { padding: 4px 12px; border-radius: 99px; font-size: 12px; font-bold; }
    .status-recovered { background: #DCFCE7; color: #16A34A; }
    .status-pending { background: #DBEAFE; color: #2563EB; }
    .status-failed { background: #FEE2E2; color: #EF4444; }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <div id="navbar-placeholder"></div>

  <main class="flex-grow pt-24 pb-12">
    <div class="max-w-7xl mx-auto px-6">
      
      <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
        <div>
          <h1 class="text-2xl font-black text-slate-900">Recovery Manager</h1>
          <p class="text-slate-500">Manage and track your automated recovery sequences.</p>
        </div>
        <div class="flex items-center gap-3 bg-white p-1 rounded-xl border border-slate-200">
           <button class="px-4 py-2 text-sm font-bold bg-blue-600 text-white rounded-lg">All</button>
           <button class="px-4 py-2 text-sm font-bold text-slate-500 hover:bg-slate-50 rounded-lg">WhatsApp</button>
           <button class="px-4 py-2 text-sm font-bold text-slate-500 hover:bg-slate-50 rounded-lg">Email</button>
        </div>
      </div>

      <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm mb-6 flex flex-wrap gap-4 items-center">
        <input type="text" placeholder="Search customer or order ID..." class="flex-grow px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition">
        <select class="px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium outline-none">
          <option>Last 30 Days</option>
          <option>Last 7 Days</option>
          <option>All Time</option>
        </select>
      </div>

      <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-slate-50 border-b border-slate-100">
                <th class="px-6 py-4 text-xs font-black text-slate-400 uppercase">Customer</th>
                <th class="px-6 py-4 text-xs font-black text-slate-400 uppercase">Cart Value</th>
                <th class="px-6 py-4 text-xs font-black text-slate-400 uppercase">Channel</th>
                <th class="px-6 py-4 text-xs font-black text-slate-400 uppercase">Status</th>
                <th class="px-6 py-4 text-xs font-black text-slate-400 uppercase text-right">Action</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-slate-50">
              <tr class="hover:bg-slate-50/50 transition">
                <td class="px-6 py-4">
                  <p class="font-bold text-slate-900">Rahat Karim</p>
                  <p class="text-xs text-slate-400">Order #8842</p>
                </td>
                <td class="px-6 py-4 font-bold text-slate-700">$149.00</td>
                <td class="px-6 py-4">
                  <span class="flex items-center gap-2 text-sm text-slate-600">
                    <span class="w-2 h-2 bg-green-500 rounded-full"></span> WhatsApp
                  </span>
                </td>
                <td class="px-6 py-4">
                  <span class="status-pill status-recovered font-bold">Recovered</span>
                </td>
                <td class="px-6 py-4 text-right">
                  <button class="text-blue-600 font-bold text-sm hover:underline">Details</button>
                </td>
              </tr>
              <tr class="hover:bg-slate-50/50 transition">
                <td class="px-6 py-4">
                  <p class="font-bold text-slate-900">Sarah Jenkins</p>
                  <p class="text-xs text-slate-400">Order #8839</p>
                </td>
                <td class="px-6 py-4 font-bold text-slate-700">$42.00</td>
                <td class="px-6 py-4">
                  <span class="flex items-center gap-2 text-sm text-slate-600">
                    <span class="w-2 h-2 bg-blue-500 rounded-full"></span> Email
                  </span>
                </td>
                <td class="px-6 py-4">
                  <span class="status-pill status-pending font-bold">In Progress</span>
                </td>
                <td class="px-6 py-4 text-right">
                  <button class="text-blue-600 font-bold text-sm hover:underline">Details</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
