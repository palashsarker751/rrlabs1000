<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovery Manager | Revenue Recovery Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(241, 245, 249, 1); }
        .status-pill { padding: 6px 12px; border-radius: 12px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
        .status-recovered { background: #F0FDF4; color: #16A34A; border: 1px solid #DCFCE7; }
        .status-pending { background: #EFF6FF; color: #2563EB; border: 1px solid #DBEAFE; }
        .status-failed { background: #FEF2F2; color: #EF4444; border: 1px solid #FEE2E2; }
        .table-row:hover { background-color: #F1F5F9; transform: scale(1.002); transition: all 0.2s ease; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="logo.png" alt="RRLabs" class="h-8">
                <span class="h-6 w-[1px] bg-slate-200"></span>
                <h2 class="text-sm font-bold text-slate-900 tracking-tight">Recovery Manager</h2>
            </div>
            <div class="flex gap-4">
                <div id="user-profile" class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold shadow-lg shadow-blue-200 cursor-pointer">P</div>
            </div>
        </div>
    </nav>

    <main class="flex-grow py-12 px-6">
        <div class="max-w-7xl mx-auto">
            
            <div class="flex flex-col md:flex-row md:items-end justify-between mb-10 gap-6">
                <div>
                    <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Analytics Overview</h1>
                    <p class="text-slate-500 mt-1">Real-time tracking of your recovery sequences.</p>
                </div>
                <div class="flex gap-3">
                    <div class="bg-white px-5 py-3 rounded-2xl border border-slate-100 shadow-sm text-center">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Total Recovered</p>
                        <p class="text-xl font-black text-blue-600" id="total-recovered-val">$0.00</p>
                    </div>
                    <button id="refresh-data" class="p-3 bg-white border border-slate-100 rounded-2xl hover:bg-slate-50 transition shadow-sm">
                        <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    </button>
                </div>
            </div>

            <div class="glass-card p-4 rounded-3xl mb-8 flex flex-wrap gap-4 items-center justify-between">
                <div class="flex flex-grow max-w-md relative">
                    <input type="text" id="search-input" placeholder="Search by customer or order..." class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition text-sm font-medium">
                    <svg class="w-5 h-5 text-slate-400 absolute left-4 top-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <div class="flex items-center gap-2">
                    <div class="bg-slate-100 p-1 rounded-xl flex gap-1">
                        <button class="px-4 py-2 text-xs font-bold bg-white text-blue-600 rounded-lg shadow-sm">All</button>
                        <button class="px-4 py-2 text-xs font-bold text-slate-500 hover:text-blue-600 rounded-lg transition">WhatsApp</button>
                        <button class="px-4 py-2 text-xs font-bold text-slate-500 hover:text-blue-600 rounded-lg transition">Email</button>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-[32px] border border-slate-100 shadow-xl shadow-slate-200/50 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-50/50 border-b border-slate-100">
                                <th class="px-8 py-5 text-[11px] font-black text-slate-400 uppercase tracking-widest">Customer Information</th>
                                <th class="px-8 py-5 text-[11px] font-black text-slate-400 uppercase tracking-widest">Revenue at Risk</th>
                                <th class="px-8 py-5 text-[11px] font-black text-slate-400 uppercase tracking-widest">Active Channel</th>
                                <th class="px-8 py-5 text-[11px] font-black text-slate-400 uppercase tracking-widest">Current Status</th>
                                <th class="px-8 py-5 text-[11px] font-black text-slate-400 uppercase tracking-widest text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="recovery-table-body" class="divide-y divide-slate-50">
                            <tr class="animate-pulse">
                                <td colspan="5" class="px-8 py-20 text-center text-slate-300 font-bold uppercase tracking-widest">Fetching Data from Labs...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script src="supabase-config.js"></script>
    <script src="recovery.js"></script>
</body>
</html>
